limit_req_zone $binary_remote_addr zone=cherry_read_api:1m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=cherry_per_ip:1m;

server {
    listen 80;
    server_name _;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 1k;
    limit_req_status 429;
    limit_conn_status 429;
    limit_conn cherry_per_ip 20;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; connect-src 'self'; frame-ancestors 'none'; img-src 'self' data:; object-src 'none'; script-src 'self' 'unsafe-eval'; style-src 'self' 'unsafe-inline'" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=()" always;

    # One deliberately small, read-only public API surface. The API key and
    # crawler write routes never cross this proxy boundary.
    location ~ "^/(?:health|api/v1/stats|api/v1/torrents/(?:recent|search|[a-f0-9]{40}))$" {
        if ($request_method != GET) { return 405; }

        limit_req zone=cherry_read_api burst=10 nodelay;
        limit_conn cherry_per_ip 8;
        proxy_pass http://api:5070;
        proxy_http_version 1.1;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-API-Key "";
        proxy_set_header Authorization "";
        proxy_set_header Cookie "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 2s;
        proxy_read_timeout 10s;
        proxy_send_timeout 5s;
        expires -1;
    }

    # Fail closed for every non-whitelisted API path and method.
    location = /api {
        if ($request_method != GET) { return 405; }
        return 404;
    }
    location /api/ {
        if ($request_method != GET) { return 405; }
        return 404;
    }

    location = /index.html {
        expires -1;
    }
    location = /app.js {
        try_files $uri =404;
        expires -1;
    }
    location = /nginx.conf { return 404; }
    location ~ /\. { return 404; }
    location ^~ /vendor/ {
        try_files $uri =404;
        expires max;
    }
    location ~* \.(?:css|js)$ {
        try_files $uri =404;
        expires 5m;
    }

    # Vue Router history-mode fallback. Only real static paths or index.html
    # are served; API paths above can never fall through into the SPA.
    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 4;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
