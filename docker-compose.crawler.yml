# Standalone crawler deployment for a dedicated server
# All crawlers report to the main API server.
# Set MAIN_API_URL to your main server's public address.
#
# Deploy:  scp this file + go/ dir to the server, then:
#          docker compose -f docker-compose.crawler.yml up -d --build

version: "3.9"

# YAML anchors — shared config, not a real service
x-crawler-base: &crawler-base
  build: ./go/cherry-picker
  restart: unless-stopped
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

x-crawler-env: &crawler-env
  CHERRY_PICKER_ROLE: combined
  CHERRY_PICKER_EVENT_QUEUE: "16384"
  CHERRY_PICKER_DEDUPE_PEER_TTL: "15m"
  CHERRY_PICKER_DEDUPE_METADATA_TTL: "1h"
  CHERRY_PICKER_DHT_MODE: crawl
  CHERRY_PICKER_EMIT_PEER_EVENTS: "true"
  CHERRY_PICKER_DHT_PACKET_WORKERS: "512"
  CHERRY_PICKER_DHT_PACKET_JOBS: "2048"
  CHERRY_PICKER_DHT_MAX_NODES: "20000"
  CHERRY_PICKER_DHT_REFRESH_NODES: "512"
  CHERRY_PICKER_METADATA_ENABLED: "true"
  CHERRY_PICKER_METADATA_BLACKLIST: "131072"
  CHERRY_PICKER_METADATA_REQUEST_QUEUE: "65536"
  CHERRY_PICKER_METADATA_WORKERS: "2048"
  CHERRY_PICKER_EXPORTER: http
  CHERRY_PICKER_EXPORTER_URL: ${MAIN_API_URL:-http://CHANGE-ME:5070}/api/v1/torrents/batch
  CHERRY_PICKER_EXPORTER_BATCH: "128"
  CHERRY_PICKER_EXPORTER_FLUSH: "2s"
  CHERRY_PICKER_EXPORTER_TIMEOUT: "5s"
  CHERRY_PICKER_EXPORTER_HTTP_RETRIES: "3"
  CHERRY_PICKER_EXPORTER_RETRY_BACKOFF: "1s"

services:
  crawler-1:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-1
      CHERRY_PICKER_LISTEN_ADDR: ":20003"
    ports: ["20003:20003/udp"]

  crawler-2:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-2
      CHERRY_PICKER_LISTEN_ADDR: ":20004"
    ports: ["20004:20004/udp"]

  crawler-3:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-3
      CHERRY_PICKER_LISTEN_ADDR: ":20005"
    ports: ["20005:20005/udp"]

  crawler-4:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-4
      CHERRY_PICKER_LISTEN_ADDR: ":20006"
    ports: ["20006:20006/udp"]

  crawler-5:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-5
      CHERRY_PICKER_LISTEN_ADDR: ":20007"
    ports: ["20007:20007/udp"]

  crawler-6:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-6
      CHERRY_PICKER_LISTEN_ADDR: ":20008"
    ports: ["20008:20008/udp"]

  crawler-7:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-7
      CHERRY_PICKER_LISTEN_ADDR: ":20009"
    ports: ["20009:20009/udp"]

  crawler-8:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: ${INSTANCE_PREFIX:-crawler}-8
      CHERRY_PICKER_LISTEN_ADDR: ":20010"
    ports: ["20010:20010/udp"]
