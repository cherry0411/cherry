name: cherry-storage

x-logging: &bounded-logging
  driver: json-file
  options:
    max-size: "20m"
    max-file: "3"

services:
  postgres:
    # PostgreSQL is the searchable-metadata authority. The immutable digest
    # avoids a tag moving underneath a restore or benchmark.
    image: postgres:17.10-alpine@sha256:742f40ea20b9ff2ff31db5458d127452988a2164df9e17441e191f3b72252193
    restart: unless-stopped
    shm_size: 256m
    mem_limit: 1280m
    cpus: "1.25"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - shared_buffers=384MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - work_mem=8MB
      - -c
      - max_connections=40
      - -c
      - wal_compression=zstd
      - -c
      - min_wal_size=512MB
      - -c
      - max_wal_size=2GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - archive_mode=${CHERRY_PG_ARCHIVE_MODE:-on}
      - -c
      - archive_timeout=300s
      - -c
      - archive_command=test -f /var/lib/postgresql/wal-archive/%f.gz || (gzip -1 -c %p > /var/lib/postgresql/wal-archive/.%f.tmp && mv /var/lib/postgresql/wal-archive/.%f.tmp /var/lib/postgresql/wal-archive/%f.gz)
    volumes:
      - ${CHERRY_DATA_ROOT:?set CHERRY_DATA_ROOT}/postgres:/var/lib/postgresql/data
      - ${CHERRY_DATA_ROOT:?set CHERRY_DATA_ROOT}/backups:/var/lib/postgresql/backups
      - ${CHERRY_DATA_ROOT:?set CHERRY_DATA_ROOT}/backups/wal:/var/lib/postgresql/wal-archive
      - ${CHERRY_DATA_ROOT:?set CHERRY_DATA_ROOT}/restore-wal:/var/lib/postgresql/restore-wal:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks: [storage]
    logging: *bounded-logging

  meilisearch:
    image: getmeili/meilisearch:v1.45.1@sha256:ac40212f9e5a7526d8007586e3e46fb0441d29dd36c7b02fa2341d2c9a1f6493
    restart: unless-stopped
    mem_limit: 1152m
    cpus: "1.0"
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
      # One indexing worker and a bounded arena preserve query/PG headroom on 2C4G.
      MEILI_MAX_INDEXING_MEMORY: 640MiB
      MEILI_MAX_INDEXING_THREADS: "1"
      MEILI_LOG_LEVEL: INFO
    volumes:
      - ${CHERRY_DATA_ROOT:?set CHERRY_DATA_ROOT}/meili:/meili_data
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 3s
      retries: 20
      start_period: 20s
    networks: [storage]
    logging: *bounded-logging

  api:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    mem_limit: 576m
    cpus: "0.75"
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    # List form lets Compose interpolate the crawler ID inside the dictionary
    # key, so each region is authenticated by a different transport secret.
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__Default=Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD};Pooling=true;Minimum Pool Size=2;Maximum Pool Size=24;Timeout=10;Command Timeout=120
      - ApiKey=${CHERRY_API_KEY:?set CHERRY_API_KEY}
      - MeiliSearch__Url=http://meilisearch:7700
      - MeiliSearch__ApiKey=${MEILI_MASTER_KEY:?set MEILI_MASTER_KEY}
      - MeiliSearch__OutboxBatchSize=${MEILI_OUTBOX_BATCH_SIZE:-500}
      - MeiliSearch__OutboxLeaseSeconds=${MEILI_OUTBOX_LEASE_SECONDS:-300}
      - MeiliSearch__TaskPollMilliseconds=${MEILI_TASK_POLL_MS:-250}
      - MeiliSearch__TaskTimeoutSeconds=${MEILI_TASK_TIMEOUT_SECONDS:-120}
      - MeiliSearch__OutboxIdleMilliseconds=${MEILI_OUTBOX_IDLE_MS:-2000}
      - Ingest__DedupCapacity=${CHERRY_DEDUP_CAPACITY:-30000000}
      - Heat__Enabled=true
      - Heat__DataDirectory=/app/data/heat
      - Heat__IndexGeneration=torrents-heat-v2
      - Heat__DailyActorSecret=${CHERRY_HEAT_DAILY_ACTOR_SECRET_BASE64:?set CHERRY_HEAT_DAILY_ACTOR_SECRET_BASE64}
      - Heat__CoverageStartDay=${CHERRY_HEAT_COVERAGE_START_DAY:?set CHERRY_HEAT_COVERAGE_START_DAY}
      - Heat__ExpectedCrawlerIds__0=${CHERRY_HEAT_CRAWLER_0:?set CHERRY_HEAT_CRAWLER_0}
      - Heat__ExpectedCrawlerIds__1=${CHERRY_HEAT_CRAWLER_1:?set CHERRY_HEAT_CRAWLER_1}
      - Heat__CrawlerSecrets__${CHERRY_HEAT_CRAWLER_0:?set CHERRY_HEAT_CRAWLER_0}=${CHERRY_HEAT_CRAWLER_0_SECRET_BASE64:?set CHERRY_HEAT_CRAWLER_0_SECRET_BASE64}
      - Heat__CrawlerSecrets__${CHERRY_HEAT_CRAWLER_1:?set CHERRY_HEAT_CRAWLER_1}=${CHERRY_HEAT_CRAWLER_1_SECRET_BASE64:?set CHERRY_HEAT_CRAWLER_1_SECRET_BASE64}
      - Heat__LateGraceMinutes=${CHERRY_HEAT_LATE_GRACE_MINUTES:-30}
      - Heat__CommitBatchRequests=${CHERRY_HEAT_COMMIT_BATCH_REQUESTS:-8}
      - Heat__ProjectionBatchSize=${CHERRY_HEAT_PROJECTION_BATCH_SIZE:-500}
      - Heat__RollingMaxBytes=${CHERRY_HEAT_ROLLING_MAX_BYTES:-5368709120}
      - Heat__RollingMinFreeBytes=${CHERRY_HEAT_ROLLING_MIN_FREE_BYTES:-2147483648}
    volumes:
      - ${CHERRY_DATA_ROOT:?set CHERRY_DATA_ROOT}/api:/app/data
    # Deliberately loopback-only. Crawlers reach this through persistent SSH
    # tunnels, so PostgreSQL, Meili, the API key, and metadata never cross the
    # public Internet in plaintext.
    ports:
      - "127.0.0.1:${CHERRY_API_PORT:-5070}:5070"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/5070' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    security_opt:
      - no-new-privileges:true
    networks: [storage]
    logging: *bounded-logging

networks:
  storage:
    internal: true
