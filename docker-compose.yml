version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cherry}
      POSTGRES_USER: ${POSTGRES_USER:-cherry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cH3rry_pg_7xK9mQw2}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cherry} -d ${POSTGRES_DB:-cherry}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-cherry};Username=${POSTGRES_USER:-cherry};Password=${POSTGRES_PASSWORD:-cH3rry_pg_7xK9mQw2};Pooling=true;MaxPoolSize=64
    ports:
      - "127.0.0.1:5070:5070"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/5070' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

  crawler:
    build: ./go/cherry-picker
    restart: unless-stopped
    depends_on:
      - api
    environment:
      CHERRY_PICKER_ROLE: combined
      CHERRY_PICKER_INSTANCE_ID: crawler-docker-1
      CHERRY_PICKER_LISTEN_ADDR: ":20003"
      CHERRY_PICKER_EVENT_QUEUE: "16384"
      CHERRY_PICKER_DEDUPE_PEER_TTL: "15m"
      CHERRY_PICKER_DEDUPE_METADATA_TTL: "1h"
      CHERRY_PICKER_DHT_MODE: crawl
      CHERRY_PICKER_EMIT_PEER_EVENTS: "true"
      CHERRY_PICKER_METADATA_ENABLED: "true"
      CHERRY_PICKER_METADATA_BLACKLIST: "131072"
      CHERRY_PICKER_METADATA_REQUEST_QUEUE: "32768"
      CHERRY_PICKER_METADATA_WORKERS: "512"
      CHERRY_PICKER_EXPORTER: http
      CHERRY_PICKER_EXPORTER_URL: http://api:5070/api/v1/torrents/batch
      CHERRY_PICKER_EXPORTER_BATCH: "128"
      CHERRY_PICKER_EXPORTER_FLUSH: "2s"
      CHERRY_PICKER_EXPORTER_TIMEOUT: "5s"
      CHERRY_PICKER_EXPORTER_HTTP_RETRIES: "3"
      CHERRY_PICKER_EXPORTER_RETRY_BACKOFF: "1s"
    ports:
      - "20003:20003/udp"

volumes:
  pgdata:
