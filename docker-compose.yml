x-crawler-base: &crawler-base
  build: ./cherry-picker
  restart: unless-stopped
  cpus: "2.0"
  mem_limit: 3584m
  depends_on: [api]
  network_mode: host
  ulimits:
    nofile:
      soft: 65535
      hard: 65535

x-crawler-env: &crawler-env
  GOMAXPROCS: "2"
  CHERRY_PICKER_ROLE: combined
  CHERRY_PICKER_MEM_LIMIT_MB: "3072"
  CHERRY_PICKER_EVENT_QUEUE: "8192"
  CHERRY_PICKER_DEDUPE_PEER_TTL: "10m"
  CHERRY_PICKER_DEDUPE_METADATA_TTL: "30m"
  CHERRY_PICKER_DHT_MODE: crawl
  CHERRY_PICKER_EMIT_PEER_EVENTS: "true"
  # Docker Desktop + FlyingBird/TUN becomes unresponsive above two active
  # identities on the tested host. Native Linux can override this to 96.
  CHERRY_PICKER_DHT_INSTANCES: "${CHERRY_PICKER_DHT_INSTANCES:-2}"
  CHERRY_PICKER_DHT_PRIME_NODES: "67.215.246.10:6881,87.98.162.88:6881,82.221.103.244:6881,34.203.221.232:6881,185.157.221.247:25401,147.78.3.239:6881"
  CHERRY_PICKER_DHT_ACTIVE_LOOKUP: "true"
  CHERRY_PICKER_DHT_LOOKUP_NODES: "32"
  CHERRY_PICKER_DHT_LOOKUP_DHTS: "1"
  CHERRY_PICKER_DHT_LOOKUP_QUEUE: "8192"
  CHERRY_PICKER_DHT_LOOKUP_RATE: "100"
  CHERRY_PICKER_DHT_PACKET_WORKERS: "1"
  CHERRY_PICKER_DHT_READ_WORKERS: "1"
  CHERRY_PICKER_DHT_PACKET_JOBS: "512"
  CHERRY_PICKER_DHT_MAX_NODES: "1000"
  CHERRY_PICKER_DHT_REFRESH_NODES: "128"
  CHERRY_PICKER_METADATA_ENABLED: "true"
  CHERRY_PICKER_METADATA_BLACKLIST: "65536"
  CHERRY_PICKER_METADATA_REQUEST_QUEUE: "65536"
  CHERRY_PICKER_METADATA_WORKERS: "1024"
  CHERRY_PICKER_EXPORTER: http
  CHERRY_PICKER_EXPORTER_URL: http://127.0.0.1:5070/api/v1/torrents/batch
  CHERRY_PICKER_EXPORTER_BATCH: "128"
  CHERRY_PICKER_EXPORTER_FLUSH: "5s"
  CHERRY_PICKER_EXPORTER_TIMEOUT: "60s"
  CHERRY_PICKER_EXPORTER_HTTP_RETRIES: "2"
  CHERRY_PICKER_EXPORTER_RETRY_BACKOFF: "5s"
  CHERRY_PICKER_WAL_DIR: /data/wal
  CHERRY_API_KEY: ${CHERRY_API_KEY:-}

services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cherry}
      POSTGRES_USER: ${POSTGRES_USER:-cherry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cindy131120}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cherry} -d ${POSTGRES_DB:-cherry}"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ConnectionStrings__Default: >-
        Host=postgres;Port=5432;Database=${POSTGRES_DB:-cherry};Username=${POSTGRES_USER:-cherry};Password=${POSTGRES_PASSWORD:-cindy131120};Pooling=true;MaxPoolSize=64
      MeiliSearch__Url: http://meilisearch:7700
      ApiKey: ${CHERRY_API_KEY:-}
    volumes:
      - apidata:/app/data
    ports:
      - "127.0.0.1:5070:5070"
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/5070' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      - api

  meilisearch:
    image: getmeili/meilisearch:latest
    restart: unless-stopped
    environment:
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meili_data:/meili_data
    ports:
      - "127.0.0.1:7700:7700"

  crawler:
    <<: *crawler-base
    environment:
      <<: *crawler-env
      CHERRY_PICKER_INSTANCE_ID: docker-crawler
      CHERRY_PICKER_LISTEN_ADDR: ":20003"
      CHERRY_PICKER_NODE_ID_DIR: /data/nodes
    volumes:
      - crawler-data:/data

volumes:
  pgdata:
  apidata:
  meili_data:
  crawler-data:
